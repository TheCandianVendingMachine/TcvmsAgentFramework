name = "TCVMs Agent Framework"
author = "tcvm"
prefix = "taf"
mainprefix = "z"

[version]
path = "addons/core/script_version.hpp"
git_hash = 0 # It's a shame that I can't get this to work

[files]
include = [
	"logo.paa",
	"changelog.md",
	"mod.cpp",
	"README.md",
	"LICENSE.md"
]

[hemtt.release]
folder = "tcvms-agent-framework"

[hemtt.launch.default]
presets = [
	"main", # .html presets from .hemtt/presets/
]
parameters = [
	"-skipIntro",			# These parameters are passed to the Arma 3 executable
	"-noSplash",			# They do not need to be added to your list
	"-showScriptErrors",	# You can add additional parameters here
	"-debug",
	"-filePatching",
]
executable = "arma3_x64" # Default: "arma3_x64"
file_patching = true # Default: true
binarize = false # Default: false
rapify = true # Default: true
